# Admins (gpuadmins) get a real shell — must appear before the gpuusers block
Match Group gpuadmins
    PermitTTY yes
    X11Forwarding no

Match Group gpuusers
    ForceCommand /usr/local/bin/iit-gpu-gateway
    PermitTTY yes
    AllowTcpForwarding no
    AllowAgentForwarding no
    AllowStreamLocalForwarding no
    X11Forwarding no
    PermitTunnel no
    GatewayPorts no
    PermitUserRC no
