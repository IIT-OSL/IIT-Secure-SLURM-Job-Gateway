# slurmdbd.conf — SLURM Database Daemon Configuration
# [LOGIN] place at /etc/slurm/slurmdbd.conf
# chown slurm:slurm /etc/slurm/slurmdbd.conf && chmod 0600 /etc/slurm/slurmdbd.conf

AuthType=auth/munge
DbdHost=login-node
DbdPort=6819

StorageType=accounting_storage/mysql
StorageHost=localhost
StorageUser=slurm
StoragePass=slurmdbpass        # ← change to your chosen password
StorageLoc=slurm_acct_db

LogFile=/var/log/slurm/slurmdbd.log
PidFile=/run/slurmdbd/slurmdbd.pid
SlurmUser=slurm

# Purge old job data after 12 months to keep the DB small
PurgeEventAfter=12months
PurgeJobAfter=12months
PurgeResvAfter=12months
PurgeStepAfter=12months
PurgeSuspendAfter=12months
PurgeTXNAfter=12months
PurgeUsageAfter=12months
